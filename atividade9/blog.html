<html>
<head>
  <title>My Blog</title>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <script type="application/javascript">  
    var url = "https://script.google.com/macros/s/AKfycbzBn3sALe1rYjz7Ze-Ik7q9TEVP0I2V3XX7GNcecWP8NvCzGt4yO_RT1OlQp09TE9cU/exec";

    function send(){        
      var data = {
        "message": document.getElementById("msg").value,
        "author": document.getElementById("autor").value
      };      
      
      fetch(url, {
        method: "POST",
        body: JSON.stringify(data),
        mode: "no-cors" 
      }).then(function() {
        document.getElementById("msg").value = "";
        document.getElementById("autor").value = "";
        carregarMensagens(); 
      });      
    }

    function carregarMensagens() {
      fetch(url)
        .then(function(resposta) {
          return resposta.json();
        })
        .then(function(dados) {
          var textoHtml = "";
          for(var i = 0; i < dados.length; i++) {
            var mensagem = dados[i][0]; 
            var autor = dados[i][1];
            
            textoHtml += "<p><strong>" + autor + ":</strong> " + mensagem + "</p>";
          }
          document.getElementById("messages").innerHTML = textoHtml;
        });
    }

    window.onload = carregarMensagens;
    setInterval(carregarMensagens, 1500);
  </script>  
</head>
<body>
  <H1 align="center">Mensagem:</H1>
  <HR><br>
  <form>
       <label>Mensagem:</label>
       <input type="text" size=64 name="msg" id="msg"><br><br>     
       <label>Autor:</label> 
       <input type="text" size=64 name="autor" id="autor">
       <br><br>
       <button type="button" onclick="send()">Enviar</button>
  </form>
  <hr>
  <h2>Mensagens:</h2>
  <div id="messages">Carregando</div>
</body>
</html>
