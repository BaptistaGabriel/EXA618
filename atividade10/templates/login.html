{% extends 'base.html' %}

{% block content %}
    <h2>Login</h2>
    <form method="POST">
        <label>Usuário:</label>
        <input type="text" name="username" required>
        <br><br>
        <label>Senha:</label>
        <input type="password" name="password" required>
        <br><br>
        <button type="submit">Entrar</button>
    </form>
{% endblock %}
